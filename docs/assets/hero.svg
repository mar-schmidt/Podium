<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" font-family="'Hanken Grotesk','Helvetica Neue',Arial,sans-serif" role="img" aria-label="Podium — Your AI agents, in concert.">
  <defs>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#46A08C"/>
      <stop offset="1" stop-color="#2F6E60"/>
    </linearGradient>
    <radialGradient id="glowTeal" cx="85%" cy="-10%" r="90%">
      <stop offset="0" stop-color="#46A08C" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#46A08C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGold" cx="8%" cy="110%" r="70%">
      <stop offset="0" stop-color="#C9A24E" stop-opacity="0.14"/>
      <stop offset="0.55" stop-color="#C9A24E" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="round"><rect width="1200" height="420" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- field -->
    <rect width="1200" height="420" fill="#F4ECE2"/>
    <rect width="1200" height="420" fill="url(#glowTeal)"/>
    <rect width="1200" height="420" fill="url(#glowGold)"/>

    <!-- faint beat motif (bottom-right) -->
    <g opacity="0.16" fill="#2F6E60">
      <rect x="1020" y="332" width="10" height="34" rx="6"/>
      <rect x="1040" y="302" width="10" height="64" rx="6"/>
      <rect x="1060" y="344" width="10" height="22" rx="6"/>
      <rect x="1080" y="318" width="10" height="48" rx="6"/>
      <rect x="1100" y="336" width="10" height="30" rx="6"/>
    </g>

    <!-- logo tile -->
    <rect x="548" y="78" width="104" height="104" rx="30" fill="url(#logo)"/>
    <svg x="570" y="100" width="60" height="60" viewBox="0 0 48 48">
      <path d="M8 31 Q18 6 30 16" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round"/>
      <circle cx="30" cy="16" r="4.6" fill="#fff"/>
      <circle cx="36" cy="23" r="2.9" fill="#fff" opacity="0.72">
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -3.5;0 0" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="41" cy="29" r="1.7" fill="#fff" opacity="0.45">
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -3.5;0 0" dur="1.5s" begin="0.16s" repeatCount="indefinite"/>
      </circle>
    </svg>

    <!-- wordmark + taglines -->
    <text x="600" y="262" text-anchor="middle" font-size="68" font-weight="800" letter-spacing="-2.7" fill="#241F1A">Podium</text>
    <text x="600" y="300" text-anchor="middle" font-size="22" font-weight="600" fill="#2F6E60">Your AI agents, in concert.</text>
    <text x="600" y="330" text-anchor="middle" font-size="15" font-weight="500" letter-spacing="0.6" fill="#A8967F" font-family="'JetBrains Mono',ui-monospace,'SFMono-Regular',Menlo,monospace">local-first · open source · conduct, don't micromanage</text>
  </g>
</svg>
