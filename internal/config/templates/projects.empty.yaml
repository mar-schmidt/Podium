# Shared project ledger (system-level, §5.3 / D22).
#
# Agents maintain this file as they create and work on projects. Each project is
# a subdirectory under ~/.podium/projects/ plus an entry below. Any agent may
# read and work on any project.
#
# Entry shape:
#   - id: mission-control
#     name: Mission Control
#     description: Next.js dashboard UI.
#     path: mission-control          # relative to ~/.podium/projects/
#     status: active                 # active | paused | done
#     stack: [Next.js, TypeScript]
#     repo: null                    # or a GitHub snapshot object from the UI
#     roadmap: []                    # derived roadmap task IDs
#     notes: >
#       Anything the next agent needs to know.
#
# Connected GitHub repos are downloaded as source snapshots into the project's
# repo/ subdirectory. They are not Git checkouts unless a future explicit Git
# workflow converts them.
projects: []
